services:
  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: iridium_test_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Test@12345"
    ports:
      - "11433:1433"
    mem_limit: 512m
    restart: unless-stopped

  # iridium-server playground mode for testing with any SQL Server client
  iridium-playground:
    build:
      context: .
      dockerfile: Dockerfile.playground
    ports:
      - "14330:1433"
    mem_limit: 256m
    restart: unless-stopped
    profiles:
      - playground
